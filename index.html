<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Arcade - 永久保存版</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            // 從 LocalStorage 讀取已儲存的遊戲清單
            const [games, setGames] = useState(() => {
                const savedGames = localStorage.getItem('arcade_games_list');
                return savedGames ? JSON.parse(savedGames).filter(g => g.type !== 'file') : [];
            });
            
            const [activeGame, setActiveGame] = useState(null);
            const [currentView, setCurrentView] = useState('lobby'); 
            const [password, setPassword] = useState('');
            const [isAuthorized, setIsAuthorized] = useState(false);
            const [showPassPrompt, setShowPassPrompt] = useState(false);
            const [newGame, setNewGame] = useState({ title: '', url: '', file: null, type: 'url' });

            const ADMIN_PASSWORD = "admin123";

            // 當遊戲清單變動時，儲存到 LocalStorage (僅限 URL 類型)
            useEffect(() => {
                const gamesToSave = games.filter(g => g.type === 'url');
                localStorage.setItem('arcade_games_list', JSON.stringify(gamesToSave));
            }, [games]);

            const handleLogin = () => {
                if (password === ADMIN_PASSWORD) {
                    setIsAuthorized(true);
                    setShowPassPrompt(false);
                    setCurrentView('settings');
                    setPassword('');
                } else {
                    alert("密碼錯誤！");
                    setPassword('');
                }
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file && file.type === "text/html") {
                    const blobUrl = URL.createObjectURL(file);
                    setNewGame({ ...newGame, file: file, url: blobUrl, type: 'file' });
                } else {
                    alert("請上傳有效的 HTML 檔案");
                }
            };

            const handleAddGame = (e) => {
                e.preventDefault();
                if (newGame.title && newGame.url) {
                    const id = Date.now();
                    const gameToAdd = { 
                        id, 
                        title: newGame.title, 
                        url: newGame.url, 
                        type: newGame.type,
                        fileName: newGame.file ? newGame.file.name : null 
                    };
                    
                    setGames([...games, gameToAdd]);
                    setNewGame({ title: '', url: '', file: null, type: 'url' });
                    
                    if (newGame.type === 'file') {
                        alert("提醒：本地上傳的檔案僅供本次工作階段遊玩，重新整理後會失效。若要永久保存，請將檔案上傳至伺服器並使用「網址」模式。");
                    } else {
                        alert("遊戲已永久新增至您的清單！");
                    }
                }
            };

            const deleteGame = (id) => {
                if (confirm("確定要刪除此遊戲嗎？")) {
                    setGames(games.filter(g => g.id !== id));
                }
            };

            const goToLobby = () => {
                setActiveGame(null);
                setCurrentView('lobby');
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center sticky top-0 z-10 shadow-xl">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={goToLobby}>
                            <div className="bg-cyan-500 p-2 rounded-lg text-slate-900">
                                <Icon name="gamepad-2" />
                            </div>
                            <h1 className="text-xl font-black tracking-tighter uppercase text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                                HTML5 Arcade
                            </h1>
                        </div>
                        
                        <div className="flex gap-2">
                            {currentView !== 'lobby' && (
                                <button onClick={goToLobby} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition-all text-sm font-medium">
                                    <Icon name="home" size={16} /> 大廳
                                </button>
                            )}
                            <button 
                                onClick={() => isAuthorized ? setCurrentView('settings') : setShowPassPrompt(true)}
                                className={`p-2 rounded-lg transition-all ${currentView === 'settings' ? 'bg-cyan-600 shadow-lg shadow-cyan-500/20' : 'bg-slate-800 hover:bg-slate-700 text-slate-400'}`}
                            >
                                <Icon name="settings" size={20} />
                            </button>
                        </div>
                    </nav>

                    <main className="p-6 max-w-7xl mx-auto flex-1 w-full">
                        {currentView === 'lobby' && (
                            <div className="animate-fade-in">
                                <div className="mb-10">
                                    <h2 className="text-3xl font-bold mb-2">我的遊戲庫</h2>
                                    <div className="h-1 w-20 bg-cyan-500 rounded-full"></div>
                                </div>

                                {games.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center py-24 text-slate-600 border-2 border-dashed border-slate-900 rounded-3xl bg-slate-900/10">
                                        <Icon name="layout" size={48} className="mb-4 opacity-10" />
                                        <p className="text-lg italic font-medium">目前清單為空</p>
                                        <p className="text-sm mt-2">請進入管理模式新增您的第一個 HTML5 遊戲</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                        {games.map((game) => (
                                            <div key={game.id} onClick={() => { setActiveGame(game); setCurrentView('play'); }} className="group relative bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 hover:border-cyan-500 transition-all cursor-pointer shadow-2xl hover:-translate-y-2 hover:shadow-cyan-500/10">
                                                <div className="aspect-video relative overflow-hidden bg-slate-950">
                                                    <div className="absolute inset-0 z-[1] bg-slate-900/60 group-hover:bg-transparent transition-colors duration-500"></div>
                                                    <iframe src={game.url} className="w-full h-full border-0 pointer-events-none scale-90 opacity-60 group-hover:opacity-100 group-hover:scale-100 transition-all duration-700 ease-out" scrolling="no" />
                                                    <div className="absolute bottom-4 left-4 z-[2] bg-cyan-600/90 backdrop-blur-sm px-3 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider">
                                                        {game.type === 'file' ? '暫存檔案' : '永久連結'}
                                                    </div>
                                                </div>
                                                <div className="p-5 flex justify-between items-center bg-slate-900">
                                                    <h3 className="font-bold text-xl group-hover:text-cyan-400 transition-colors">{game.title}</h3>
                                                    <div className="bg-slate-800 p-2 rounded-full text-slate-500 group-hover:text-cyan-400 group-hover:bg-cyan-400/10 transition-all">
                                                        <Icon name="maximize-2" size={18} />
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {currentView === 'settings' && isAuthorized && (
                            <div className="max-w-2xl mx-auto animate-fade-in">
                                <div className="flex justify-between items-end mb-8">
                                    <div>
                                        <h2 className="text-3xl font-bold">管理控制台</h2>
                                        <p className="text-slate-400 text-sm mt-1">變動將會自動儲存於此瀏覽器</p>
                                    </div>
                                    <button onClick={() => setIsAuthorized(false)} className="text-red-400 text-sm hover:underline font-medium">安全登出</button>
                                </div>

                                <div className="bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl mb-8 border-t-4 border-t-cyan-600">
                                    <form onSubmit={handleAddGame} className="space-y-6">
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-400 mb-2">遊戲名稱</label>
                                            <input type="text" required value={newGame.title} onChange={(e) => setNewGame({...newGame, title: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-500 transition-all" placeholder="例如：我的酷炫遊戲" />
                                        </div>

                                        <div className="flex bg-slate-950 p-1.5 rounded-xl border border-slate-800">
                                            <button type="button" onClick={() => setNewGame({...newGame, type: 'url'})} className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg font-bold transition-all ${newGame.type === 'url' ? 'bg-slate-800 text-cyan-400 shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>
                                                <Icon name="link" size={16} /> 永久網址
                                            </button>
                                            <button type="button" onClick={() => setNewGame({...newGame, type: 'file'})} className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg font-bold transition-all ${newGame.type === 'file' ? 'bg-slate-800 text-cyan-400 shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>
                                                <Icon name="upload" size={16} /> 暫存上傳
                                            </button>
                                        </div>

                                        {newGame.type === 'url' ? (
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-400 mb-2">遊戲 URL (相對或絕對路徑)</label>
                                                <input type="text" required value={newGame.url} onChange={(e) => setNewGame({...newGame, url: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-500 transition-all" placeholder="games/my-game/index.html" />
                                                <p className="text-[10px] text-slate-500 mt-2 px-1 italic">提示：若已上傳至 GitHub，可直接輸入資料夾路徑。</p>
                                            </div>
                                        ) : (
                                            <div>
                                                <label className="block text-sm font-semibold text-slate-400 mb-2">上傳 .html 檔案</label>
                                                <div className="border-2 border-dashed border-slate-800 rounded-2xl p-10 text-center relative hover:border-cyan-500/50 hover:bg-cyan-500/5 transition-all">
                                                    <input type="file" accept=".html" onChange={handleFileChange} className="absolute inset-0 opacity-0 cursor-pointer" />
                                                    <Icon name="upload-cloud" className="mx-auto mb-3 text-slate-600" size={40} />
                                                    <p className="text-sm font-medium text-slate-400">{newGame.file ? `已選取：${newGame.file.name}` : "點擊或拖放檔案至此"}</p>
                                                    <p className="text-[10px] text-slate-500 mt-2">注意：此方式在頁面重新整理後會消失</p>
                                                </div>
                                            </div>
                                        )}

                                        <button type="submit" className="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 py-4 rounded-xl font-black text-lg shadow-xl shadow-cyan-900/20 transition-all active:scale-[0.98]">
                                            確認新增至遊戲庫
                                        </button>
                                    </form>
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] px-2">清單管理 ({games.length})</h3>
                                    {games.length === 0 ? (
                                        <div className="bg-slate-900/50 border border-slate-900 p-8 rounded-2xl text-center italic text-slate-700 text-sm">
                                            尚未加入任何永久遊戲
                                        </div>
                                    ) : (
                                        <div className="grid gap-3">
                                            {games.map(g => (
                                                <div key={g.id} className="bg-slate-900 border border-slate-800 p-4 rounded-2xl flex justify-between items-center group">
                                                    <div className="flex items-center gap-4">
                                                        <div className={`p-2.5 rounded-xl ${g.type === 'file' ? 'bg-amber-500/10 text-amber-500' : 'bg-cyan-500/10 text-cyan-400'}`}>
                                                            <Icon name={g.type === 'file' ? 'clock' : 'globe'} size={18} />
                                                        </div>
                                                        <div className="overflow-hidden">
                                                            <p className="font-bold text-slate-200">{g.title}</p>
                                                            <p className="text-[10px] text-slate-600 truncate max-w-[180px] sm:max-w-xs">{g.url}</p>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => deleteGame(g.id)} className="p-2 text-slate-700 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-all">
                                                        <Icon name="trash-2" size={20} />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {currentView === 'play' && activeGame && (
                            <div className="fixed inset-0 z-50 bg-black flex flex-col animate-fade-in">
                                <div className="bg-slate-900 p-3 flex justify-between items-center border-b border-slate-800 shadow-2xl">
                                    <div className="flex items-center gap-4">
                                        <button onClick={goToLobby} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl text-sm font-black transition-all active:scale-95">
                                            <Icon name="chevron-left" size={18} /> 返回大廳
                                        </button>
                                        <div className="h-6 w-[1px] bg-slate-800"></div>
                                        <h2 className="text-lg font-bold text-cyan-400 drop-shadow-md">{activeGame.title}</h2>
                                    </div>
                                    <div className="hidden sm:flex items-center gap-2 px-3 py-1 bg-slate-950 rounded-full border border-slate-800">
                                        <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                        <span className="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">Live Session</span>
                                    </div>
                                </div>
                                <div className="flex-1 w-full bg-white relative">
                                    <iframe src={activeGame.url} className="w-full h-full border-0" allow="autoplay; fullscreen; pointer-lock" />
                                </div>
                            </div>
                        )}
                    </main>

                    {showPassPrompt && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-xl animate-fade-in">
                            <div className="bg-slate-900 border border-slate-800 rounded-[2.5rem] p-10 w-full max-w-sm text-center shadow-3xl">
                                <div className="bg-gradient-to-br from-cyan-500 to-blue-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-8 rotate-3 shadow-2xl shadow-cyan-500/20">
                                    <Icon name="shield-check" size={40} className="text-white" />
                                </div>
                                <h3 className="text-2xl font-black mb-2">管理員驗證</h3>
                                <p className="text-slate-500 text-sm mb-8">請輸入安全密碼以解鎖管理介面</p>
                                
                                <input 
                                    type="password" 
                                    autoFocus 
                                    value={password} 
                                    onChange={(e) => setPassword(e.target.value)} 
                                    onKeyDown={(e) => e.key === 'Enter' && handleLogin()} 
                                    className="w-full bg-slate-950 border border-slate-800 rounded-2xl px-6 py-4 mb-6 text-center focus:ring-2 focus:ring-cyan-500 outline-none transition-all text-xl tracking-widest" 
                                    placeholder="••••••" 
                                />
                                
                                <div className="flex gap-4">
                                    <button onClick={() => setShowPassPrompt(false)} className="flex-1 bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-bold transition-all">取消</button>
                                    <button onClick={handleLogin} className="flex-1 bg-cyan-600 hover:bg-cyan-500 py-4 rounded-2xl font-black transition-all shadow-lg shadow-cyan-500/20">授權</button>
                                </div>
                                <p className="mt-8 text-[10px] text-slate-700 font-mono tracking-widest">DEFAULT_KEY: admin123</p>
                            </div>
                        </div>
                    )}
                    
                    <footer className="p-10 text-center text-slate-900 text-[10px] uppercase tracking-[0.4em] font-black">
                        Encrypted Arcade Terminal v2.0 // {isAuthorized ? "Admin_Active" : "Guest_Limited"}
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
